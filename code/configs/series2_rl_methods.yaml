# Серия 2: сравнение схем RL-дообучения на OpenVLA-OFT
series: 2
description: "Выбор метода RL на одной модели"

model: openvla_oft
suite: libero_object

# Перебираемые режимы (multirun: -m mode=residual_sac,direct_sac,stare_ppo)
mode: residual_sac          # residual_sac | direct_sac | stare_ppo

total_steps: 300000
seed: 42
buffer_size: 1000000
batch_size: 256
learning_rate: 3.0e-4
tau: 0.005
residual_scale: 0.1
horizon: 220

stage_reward:
  reach_threshold: 0.05
  transport_threshold: 0.15
  weights: [0.25, 0.25, 0.25, 0.25]
  success_bonus: 1.0
  monotonic: true
