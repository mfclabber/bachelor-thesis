# Серия 5: VLM-кодогенерация функции награды на MetaWorld (без предобученной VLA)
series: 5
description: "Альтернатива без VLA: VLM-код + SAC"

vlm:
  model_name: Qwen/Qwen2.5-VL-7B-Instruct
  temperature: 0.7
  max_tokens: 2048
  reflection_iters: 3

tasks:
  - reach-v3
  - push-v3
  - pick-place-v3

rl:
  algo: sac
  total_steps: 300000
  seeds: [7, 13, 42]
  learning_rate: 3.0e-4
  buffer_size: 1000000
  batch_size: 256

out_dir: results/metaworld/reward_code
